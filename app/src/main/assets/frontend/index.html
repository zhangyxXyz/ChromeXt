<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>ChromeXt</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="library-pane">
        <header class="topbar">
          <div>
            <h1 data-i18n="managerTitle">Script Manager</h1>
          </div>
          <button id="new-script" class="icon-button" type="button" aria-label="New script">+</button>
        </header>

        <label class="search-box">
          <input
            id="search"
            type="search"
            data-i18n-placeholder="searchPlaceholder"
            placeholder="Search scripts"
            autocomplete="off" />
        </label>

        <div class="library-actions">
          <button id="import-scripts" class="ghost-inline" type="button" data-i18n="importScripts">
            Import
          </button>
          <button id="export-scripts" class="ghost-inline" type="button" data-i18n="exportScripts">
            Export
          </button>
          <button
            id="batch-reinstall"
            class="ghost-inline"
            type="button"
            data-i18n="batchReinstall">
            Batch reinstall
          </button>
          <input
            id="import-file"
            type="file"
            accept=".json,.js,.user.js,text/*,application/json"
            multiple />
        </div>

        <div id="status" class="status" data-i18n="connecting">Connecting to ChromeXt...</div>
        <div id="script-list" class="script-list"></div>
      </section>

      <section class="editor-pane">
        <header class="editor-header">
          <button id="back" class="ghost-button" type="button" data-i18n="list">List</button>
          <div class="editor-title">
            <p id="script-id" data-i18n="noScriptSelected">No script selected</p>
            <h2 id="script-name" data-i18n="selectScriptHint">Select a script on the left</h2>
          </div>
          <label class="switch detail-switch" aria-label="Enable script">
            <input id="enabled-toggle" type="checkbox" />
            <span></span>
          </label>
          <button id="save" class="primary-button" type="button" disabled data-i18n="save">Save</button>
        </header>

        <div class="meta-strip">
          <span id="match-count">0 matches</span>
          <span id="grant-count">0 grants</span>
          <button id="view-source" class="ghost-inline" type="button" disabled data-i18n="source">Source</button>
          <button id="reinstall" class="ghost-inline" type="button" disabled data-i18n="reinstall">
            Reinstall
          </button>
          <button id="delete" class="danger-button" type="button" disabled data-i18n="delete">Delete</button>
        </div>

        <div id="details" class="details">
          <section>
            <h3>Match</h3>
            <div id="match-list" class="rule-list"></div>
            <textarea id="match-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Include</h3>
            <div id="include-list" class="rule-list"></div>
            <textarea id="include-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Exclude</h3>
            <div id="exclude-list" class="rule-list"></div>
            <textarea id="exclude-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Grant</h3>
            <div id="grant-list" class="rule-list"></div>
          </section>
        </div>

        <textarea
          id="source"
          class="source-editor"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          data-i18n-placeholder="sourcePlaceholder"
          placeholder="Script source appears here"></textarea>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>

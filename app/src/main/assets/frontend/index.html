<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>ChromeXt</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="library-pane">
        <header class="topbar">
          <div>
            <h1>脚本管理</h1>
          </div>
          <button id="new-script" class="icon-button" type="button" aria-label="新建脚本">+</button>
        </header>

        <label class="search-box">
          <input id="search" type="search" placeholder="搜索脚本" autocomplete="off" />
        </label>

        <div id="status" class="status">正在连接 ChromeXt...</div>
        <div id="script-list" class="script-list"></div>
      </section>

      <section class="editor-pane">
        <header class="editor-header">
          <button id="back" class="ghost-button" type="button">列表</button>
          <div class="editor-title">
            <p id="script-id">未选择脚本</p>
            <h2 id="script-name">选择左侧脚本查看详情</h2>
          </div>
          <label class="switch detail-switch" aria-label="启用脚本">
            <input id="enabled-toggle" type="checkbox" />
            <span></span>
          </label>
          <button id="save" class="primary-button" type="button" disabled>保存</button>
        </header>

        <div class="meta-strip">
          <span id="match-count">0 匹配</span>
          <span id="grant-count">0 权限</span>
          <button id="view-source" class="ghost-inline" type="button" disabled>源码</button>
          <button id="delete" class="danger-button" type="button" disabled>删除</button>
        </div>

        <div id="details" class="details">
          <section>
            <h3>Match</h3>
            <div id="match-list" class="rule-list"></div>
            <textarea id="match-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Include</h3>
            <div id="include-list" class="rule-list"></div>
            <textarea id="include-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Exclude</h3>
            <div id="exclude-list" class="rule-list"></div>
            <textarea id="exclude-editor" class="meta-editor" rows="3" spellcheck="false"></textarea>
          </section>
          <section>
            <h3>Grant</h3>
            <div id="grant-list" class="rule-list"></div>
          </section>
        </div>

        <textarea
          id="source"
          class="source-editor"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="脚本源码会显示在这里"></textarea>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>

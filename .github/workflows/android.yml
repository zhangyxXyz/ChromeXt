name: Android Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v3.8.3"
        required: true
        default: "v3.8.3"
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${{ github.event.inputs.tag }}"
          fi

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid tag: ${TAG_NAME}" >&2
            exit 1
          fi

          VERSION_NAME="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Building ChromeXt ${VERSION_NAME} from ${TAG_NAME}"

      - name: Build release
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew app:assembleRelease

      - name: Sign APK
        id: sign
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="app/build/outputs/apk/release/ChromeXt-${TAG_NAME}-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/release/ChromeXt-${TAG_NAME}.apk"

          if [[ -n "${SIGNING_KEY}" && -n "${ALIAS}" && -n "${KEY_STORE_PASSWORD}" && -n "${KEY_PASSWORD}" ]]; then
            echo "${SIGNING_KEY}" | base64 --decode > release.keystore
            KEYSTORE="release.keystore"
            STORE_PASS="${KEY_STORE_PASSWORD}"
            KEY_PASS="${KEY_PASSWORD}"
            KEY_ALIAS="${ALIAS}"
          else
            echo "Signing secrets are not configured; using a temporary CI key."
            keytool -genkeypair \
              -keystore ci.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=ChromeXt CI,O=ChromeXt,C=US"
            KEYSTORE="ci.keystore"
            STORE_PASS="android"
            KEY_PASS="android"
            KEY_ALIAS="androiddebugkey"
          fi

          "${BUILD_TOOLS}/zipalign" -p -f 4 "${UNSIGNED_APK}" "${ALIGNED_APK}"
          "${BUILD_TOOLS}/apksigner" sign \
            --ks "${KEYSTORE}" \
            --ks-key-alias "${KEY_ALIAS}" \
            --ks-pass "pass:${STORE_PASS}" \
            --key-pass "pass:${KEY_PASS}" \
            --out "${SIGNED_APK}" \
            "${ALIGNED_APK}"
          "${BUILD_TOOLS}/apksigner" verify --verbose "${SIGNED_APK}"

          echo "apk=${SIGNED_APK}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromeXt-${{ steps.version.outputs.tag }}.apk
          path: ${{ steps.sign.outputs.apk }}

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.apk }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

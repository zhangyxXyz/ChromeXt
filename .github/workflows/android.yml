name: Android Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v3.8.3"
        required: true
        default: "v3.8.3"
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="${{ github.event.inputs.tag }}"
          fi

          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid tag: ${TAG_NAME}" >&2
            exit 1
          fi

          VERSION_NAME="${TAG_NAME#v}"
          echo "tag=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "Building ChromeXt ${VERSION_NAME} from ${TAG_NAME}"

      - name: Prepare release signing
        shell: bash
        env:
          CHROMEXT_SIGNING_KEYSTORE_BASE64: ${{ secrets.CHROMEXT_SIGNING_KEYSTORE_BASE64 }}
          CHROMEXT_KEYSTORE_PASSWORD: ${{ secrets.CHROMEXT_KEYSTORE_PASSWORD }}
          CHROMEXT_KEY_ALIAS: ${{ secrets.CHROMEXT_KEY_ALIAS }}
          CHROMEXT_KEY_PASSWORD: ${{ secrets.CHROMEXT_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for secret in \
            CHROMEXT_SIGNING_KEYSTORE_BASE64 \
            CHROMEXT_KEYSTORE_PASSWORD \
            CHROMEXT_KEY_ALIAS \
            CHROMEXT_KEY_PASSWORD; do
            if [[ -z "${!secret}" ]]; then
              echo "${secret} is not configured." >&2
              exit 1
            fi
          done
          echo "${CHROMEXT_SIGNING_KEYSTORE_BASE64}" | base64 --decode > release.keystore

      - name: Build release
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          CHROMEXT_SIGNING_STORE_FILE: release.keystore
          CHROMEXT_KEYSTORE_PASSWORD: ${{ secrets.CHROMEXT_KEYSTORE_PASSWORD }}
          CHROMEXT_KEY_ALIAS: ${{ secrets.CHROMEXT_KEY_ALIAS }}
          CHROMEXT_KEY_PASSWORD: ${{ secrets.CHROMEXT_KEY_PASSWORD }}
        run: ./gradlew app:assembleRelease

      - name: Verify signed APK
        id: apk
        shell: bash
        env:
          TAG_NAME: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          BUILD_TOOLS="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          SIGNED_APK="app/build/outputs/apk/release/ChromeXt-${TAG_NAME}.apk"

          cp "${RELEASE_APK}" "${SIGNED_APK}"
          "${BUILD_TOOLS}/apksigner" verify --verbose "${SIGNED_APK}"

          echo "apk=${SIGNED_APK}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChromeXt-${{ steps.version.outputs.tag }}.apk
          path: ${{ steps.apk.outputs.apk }}

      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
